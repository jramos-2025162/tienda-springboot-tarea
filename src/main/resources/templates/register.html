<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse — Tienda</title>
    <style>

        :root {
            --azul-marino: #1a237e;
            --morado-oscuro: #4a148c;
            --morado-claro: #7c43bd;
            --blanco: #ffffff;
            --gris-texto: #64748b;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height:100vh; display:flex; justify-content:center;
            align-items:center;

            background: linear-gradient(135deg, #0d1252, #1a237e, #4a148c);
            padding:20px;
        }

        .contenedor { width:100%; max-width:420px; }

        .tarjeta {
            background:rgba(255,255,255,0.96); backdrop-filter:blur(8px);
            border-radius:24px; box-shadow:0 20px 50px rgba(0,0,0,0.35);
            padding:35px 30px; text-align:center;
            animation:aparecer 0.6s ease;
        }

        @keyframes aparecer {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }

        .titulo { font-size:28px; color: var(--azul-marino); margin-bottom:8px; }
        .subtitulo { font-size:14px; color: var(--gris-texto); margin-bottom:22px; }

        .campo { margin-bottom:16px; text-align:left; }

        .campo label {
            display:block; font-size:12px; color: var(--gris-texto);
            margin-bottom:5px; text-transform:uppercase;
            letter-spacing:.5px; font-weight:600;
        }

        .campo input, .campo select {
            width:100%; padding:13px 15px; border:1px solid #c5cae9;
            border-radius:12px; font-size:14px; outline:none;
            background:#f8fafc; transition:all .3s;
            font-family: inherit;
        }

        .campo input:focus, .campo select:focus {
            background:#fff; border-color: var(--morado-oscuro);
            box-shadow:0 0 0 4px rgba(74,20,140,.12);
        }


        .boton {
            width:100%; padding:13px 20px; border:none;
            border-radius:14px; color:#fff; font-size:15px;
            font-weight:bold; cursor:pointer; transition:all .3s;
            background: linear-gradient(135deg, var(--morado-oscuro), var(--morado-claro));
            box-shadow:0 8px 18px rgba(74,20,140,.25);
            margin-top: 10px;
        }

        .boton:hover {
            transform:translateY(-2px);
            box-shadow:0 14px 26px rgba(74,20,140,0.4);
            filter: brightness(1.1);
        }

        .boton:active { transform:scale(.98); }

        .mensaje-error {
            background:#fee2e2; color:#b91c1c; border:1px solid #fecaca;
            border-radius:10px; padding:9px 13px; font-size:13px;
            font-weight:500; margin-bottom:10px; text-align:center;
        }

        p { margin-top:18px; font-size:13px; color: var(--gris-texto); }
        a { color: var(--azul-marino); font-weight: 600; text-decoration: none; }
        a:hover { color: var(--morado-oscuro); text-decoration: underline; }

        @media(max-width:480px) {
            .tarjeta { padding:26px 18px; }
            .titulo { font-size:23px; }
        }
    </style>
</head>
<body>
<div class="contenedor">
    <div class="tarjeta">
        <h2 class="titulo">Crear una cuenta</h2>
        <p class="subtitulo">Complete los campos para unirse a la tienda</p>

        <div th:if="${errorRegistro}" class="mensaje-error" th:text="${errorRegistro}"></div>
        <div th:if="${errores}">
            <div th:each="error : ${errores}" class="mensaje-error" th:text="${error.defaultMessage}"></div>
        </div>

        <form th:action="@{/register}" method="post">
            <div class="campo">
                <label for="nombreUsuario">Nombre</label>
                <input type="text" name="nombreUsuario" id="nombreUsuario"
                       placeholder="Ej: Jancarlo" required>
            </div>

            <div class="campo">
                <label for="apellidoUsuario">Apellido</label>
                <input type="text" name="apellidoUsuario" id="apellidoUsuario"
                       placeholder="Ej: Ramos" required>
            </div>

            <div class="campo">
                <label for="email">Correo Electrónico</label>
                <input type="email" name="email" id="email"
                       placeholder="correo@ejemplo.com" required>
            </div>

            <!-- Rol fijado a USUARIO: solo el administrador definido en BD puede ser ADMIN -->
            <input type="hidden" name="rol" value="USUARIO">

            <div class="campo">
                <label for="edadUsuario">Edad</label>
                <input type="number" name="edadUsuario" id="edadUsuario"
                       placeholder="Tu edad" min="1" max="120" required>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" name="password" id="password"
                       placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit" class="boton">Registrarse ahora</button>
        </form>

        <p>¿Ya tienes una cuenta? <a th:href="@{/login}">Inicia Sesión</a></p>
    </div>
</div>
</body>
</html>
