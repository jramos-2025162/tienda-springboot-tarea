<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — Tienda</title>
    <style>
        :root {
          --azul-marino: #1a237e;
          --morado-oscuro: #4a148c;
          --morado-claro: #7c43bd;
          --blanco: #ffffff;
          --gris-fondo: #f0f2f5;
        }

        *{margin:0;padding:0;box-sizing:border-box;}

        body {
          font-family: 'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
          min-height: 100vh;
          background: linear-gradient(135deg, #0d1252, #1a237e, #283593);
          padding: 30px 20px;
        }

        .pagina{max-width:1000px;margin:0 auto;}

        .cabecera{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
        .cabecera h1{color:#fff;font-size:28px;text-shadow:0 2px 8px rgba(0,0,0,.3);}

        .btn{padding:10px 20px;border:none;border-radius:12px;font-size:14px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block;transition:all .3s;}

        .btn-volver{background: var(--morado-oscuro); color:#fff; box-shadow:0 4px 12px rgba(74,20,140,0.3);}
        .btn-volver:hover{transform:translateY(-2px); background: var(--morado-claro);}

        .btn-nuevo{background: linear-gradient(135deg, var(--morado-oscuro), var(--morado-claro)); color:#fff; box-shadow:0 4px 12px rgba(74,20,140,0.3); display:flex; align-items:center; gap:8px;}
        .btn-nuevo:hover{transform:translateY(-2px); filter:brightness(1.1);}

        .alerta-exito{background:#e8eaf6; color:#1a237e; border:1px solid #c5cae9; border-radius:12px; padding:12px 18px; margin-bottom:18px; font-weight:500; font-size:14px;}

        .buscador-y-boton{display:flex;gap:15px;margin-bottom:16px;align-items:center;}
        .buscador-wrap{flex-grow:1;}
        .buscador{width:100%;padding:12px 16px;border:none;border-radius:12px;font-size:14px;outline:none;background:rgba(255,255,255,.92);box-shadow:0 4px 12px rgba(0,0,0,.1);}
        .buscador:focus{background:#fff; box-shadow: 0 0 0 3px rgba(74,20,140,0.2);}

        .tarjeta-tabla{background:rgba(255,255,255,.96);border-radius:20px;box-shadow:0 16px 40px rgba(0,0,0,.2);overflow:hidden;}
        table{width:100%;border-collapse:collapse;}

        thead tr{background: var(--azul-marino); color:#fff;}
        thead th{padding:16px 18px;text-align:left;font-size:13px;letter-spacing:.6px;text-transform:uppercase;}

        tbody tr{border-bottom:1px solid #f1f5f9;transition:background .2s;}
        tbody tr:hover{background:#ede7f6;}
        tbody td{padding:14px 18px;color:#1e293b;font-size:14px;}

        .acciones-td{display:flex;gap:8px;}

        .btn-editar{background: var(--azul-marino); color:#fff; padding:7px 14px; border-radius:9px; font-size:12px; border:none; cursor:pointer; font-weight:bold; transition:all .3s;}
        .btn-eliminar{background: linear-gradient(135deg, #d32f2f, #f44336); color:#fff; padding:7px 14px; border-radius:9px; font-size:12px; border:none; cursor:pointer; font-weight:bold; transition:all .3s; text-decoration:none;}

        .badge-admin{background: var(--morado-oscuro); color:#fff; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;}
        .badge-usuario{background: var(--azul-marino); color:#fff; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;}

        /* MODAL */
        .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:1000;justify-content:center;align-items:center;}
        .overlay.activo{display:flex;}

        .modal{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:480px;box-shadow:0 24px 60px rgba(0,0,0,.35);animation:popIn .3s ease;}
        @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

        .modal h2{color: var(--azul-marino); font-size:22px; margin-bottom:22px; text-align:center;}
        .campo{margin-bottom:16px;}
        .campo label{display:block;font-size:12px;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
        .campo input, .campo select{width:100%;padding:12px 14px;border:1px solid #c5cae9;border-radius:10px;font-size:14px;outline:none;background:#f8fafc;}

        .modal-acciones{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
        .btn-guardar{background: var(--morado-oscuro); color:#fff; padding:11px 24px; border-radius:12px; border:none; font-size:14px; font-weight:bold; cursor:pointer;}
        .btn-cancelar{background:#e2e8f0;color:#475569;padding:11px 24px;border-radius:12px;border:none;font-size:14px;font-weight:bold;cursor:pointer;}
    </style>
</head>
<body>
<div class="pagina">
    <div class="cabecera">
        <h1>👥 Usuarios</h1>
        <a th:href="@{/home}" class="btn btn-volver">← Volver al Inicio</a>
    </div>

    <div th:if="${mensajeExito}" class="alerta-exito" th:text="${mensajeExito}"></div>

    <div class="buscador-y-boton">
        <div class="buscador-wrap">
            <input class="buscador" type="text" id="buscador" placeholder="🔍 Buscar usuario..." onkeyup="filtrarTabla()">
        </div>
        <a th:href="@{/register}" class="btn btn-nuevo">
            <span>➕ Nuevo Usuario</span>
        </a>
    </div>

    <div class="tarjeta-tabla">
        <table id="tablaUsuario">
            <thead>
            <tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Email</th><th>Edad</th><th>Rol</th><th>Acciones</th></tr>
            </thead>
            <tbody>
            <tr th:each="usr : ${usuarios}">
                <td th:text="${usr.idUsuario}"></td>
                <td th:text="${usr.nombreUsuario}"></td>
                <td th:text="${usr.apellidoUsuario}"></td>
                <td th:text="${usr.email}"></td>
                <td th:text="${usr.edadUsuario}"></td>
                <td>
                    <span th:if="${usr.rol.name() == 'ADMIN'}" class="badge-admin">🛡 ADMIN</span>
                    <span th:if="${usr.rol.name() == 'USUARIO'}" class="badge-usuario">👤 USUARIO</span>
                </td>
                <td>
                    <div class="acciones-td">
                        <button type="button" class="btn-editar"
                                th:attr="onclick='abrirModalEditar(' + ${usr.idUsuario} + ', \'' + ${usr.nombreUsuario} + '\', \'' + ${usr.apellidoUsuario} + '\', ' + ${usr.edadUsuario} + ', \'' + ${usr.rol} + '\', \'' + ${usr.email} + '\', \'' + ${usr.password} + '\')'">
                            ✏ Editar
                        </button>
                        <a th:href="@{/usuario/eliminar/{id}(id=${usr.idUsuario})}" class="btn-eliminar" onclick="return confirm('¿Eliminar usuario?')">
                            🗑 Eliminar
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="overlay" id="modalOverlay">
    <div class="modal">
        <h2>✏ Editar Usuario</h2>
        <form id="formEditar" th:action="@{/usuario/actualizar/0}" method="post">
            <input type="hidden" id="editId" name="idUsuario">
            <input type="hidden" id="editPassword" name="password">

            <div class="campo">
                <label>Nombre</label>
                <input type="text" id="editNombre" name="nombreUsuario" required>
            </div>
            <div class="campo">
                <label>Apellido</label>
                <input type="text" id="editApellido" name="apellidoUsuario" required>
            </div>
            <div class="campo">
                <label>Email (Lectura)</label>
                <input type="email" id="editEmail" name="email" readonly style="background:#e9ecef;">
            </div>
            <div class="campo">
                <label>Edad</label>
                <input type="number" id="editEdad" name="edadUsuario" min="1" max="120" required>
            </div>
            <div class="campo">
                <label>Rol</label>
                <select id="editRol" name="rol">
                    <option value="USUARIO">USUARIO</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div class="modal-acciones">
                <button type="button" class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn-guardar">💾 Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>

<script>
    function abrirModalEditar(id, nombre, apellido, edad, rol, email, pass) {
        const form = document.getElementById('formEditar');
        form.action = '/usuario/actualizar/' + id;
        document.getElementById('editId').value = id;
        document.getElementById('editNombre').value = nombre;
        document.getElementById('editApellido').value = apellido;
        document.getElementById('editEdad').value = edad;
        document.getElementById('editRol').value = rol;
        document.getElementById('editEmail').value = email;
        document.getElementById('editPassword').value = pass;
        document.getElementById('modalOverlay').classList.add('activo');
    }

    function cerrarModal(){ document.getElementById('modalOverlay').classList.remove('activo'); }

    function filtrarTabla(){
        const f = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('#tablaUsuario tbody tr').forEach(r=>{
            r.style.display = r.textContent.toLowerCase().includes(f) ? '' : 'none';
        });
    }

    // Cerrar modal si se hace clic fuera
    window.onclick = function(event) {
        if (event.target.className === 'overlay activo') { cerrarModal(); }
    }
</script>
</body>
</html>
