<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías — Tienda</title>
    <style>

        :root {
            --azul-marino: #1a237e;
            --morado-oscuro: #4a148c;
            --morado-claro: #7c43bd;
            --blanco: #ffffff;
            --gris-fondo: #f0f2f5;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            min-height:100vh;

            background: linear-gradient(135deg, #0d1252, #1a237e, #4a148c);
            padding:30px 20px;
        }

        .pagina { max-width:900px; margin:0 auto; }

        .cabecera {
            display:flex; justify-content:space-between;
            align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px;
        }

        .cabecera h1 {
            color:#fff; font-size:28px;
            text-shadow:0 2px 8px rgba(0,0,0,.3);
        }

        .cabecera-acciones { display:flex; gap:10px; }

        .btn {
            padding:10px 20px; border:none; border-radius:12px;
            font-size:14px; font-weight:bold; cursor:pointer;
            text-decoration:none; display:inline-block;
            transition:all .3s ease;
        }


        .btn-nuevo {
            background: linear-gradient(135deg, var(--morado-oscuro), var(--morado-claro));
            color:#fff; box-shadow:0 6px 14px rgba(74,20,140,0.3);
        }
        .btn-nuevo:hover { transform:translateY(-2px); filter: brightness(1.1); }


        .btn-volver {
            background: #0d1252;
            color:#fff; box-shadow:0 6px 14px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-volver:hover { transform:translateY(-2px); background: #151b77; }

        .alerta-exito {
            background:#e8eaf6; color: var(--azul-marino);
            border:1px solid #c5cae9; border-radius:12px;
            padding:12px 18px; margin-bottom:18px;
            font-weight:500; font-size:14px;
        }

        .buscador-wrap { margin-bottom:16px; }
        .buscador {
            width:100%; padding:12px 16px;
            border:none; border-radius:12px;
            font-size:14px; outline:none;
            background:rgba(255,255,255,.92);
            box-shadow:0 4px 12px rgba(0,0,0,.1);
        }
        .buscador:focus { background:#fff; box-shadow: 0 0 0 3px rgba(74,20,140,0.2); }

        .tarjeta-tabla {
            background:rgba(255,255,255,.96);
            border-radius:20px;
            box-shadow:0 16px 40px rgba(0,0,0,.2);
            overflow:hidden;
        }

        table { width:100%; border-collapse:collapse; }


        thead tr {
            background: var(--azul-marino);
            color:#fff;
        }

        thead th {
            padding:16px 18px; text-align:left;
            font-size:13px; letter-spacing:.6px; text-transform:uppercase;
        }

        tbody tr { border-bottom:1px solid #f1f5f9; transition:background .2s; }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background: #ede7f6; }

        tbody td { padding:14px 18px; color:#1e293b; font-size:14px; }

        .acciones-td { display:flex; gap:8px; flex-wrap:wrap; }

        .btn-editar {
            background: var(--azul-marino);
            color:#fff; padding:7px 14px;
            border-radius:9px; font-size:12px;
            border:none; cursor:pointer;
            text-decoration:none; font-weight:bold;
            transition:all .3s;
        }
        .btn-editar:hover { background: #283593; transform:translateY(-1px); }

        .btn-eliminar {
            background: linear-gradient(135deg, #d32f2f, #f44336);
            color:#fff; padding:7px 14px;
            border-radius:9px; font-size:12px;
            border:none; cursor:pointer;
            font-weight:bold; transition:all .3s;
        }
        .btn-eliminar:hover { transform:translateY(-1px); }

        .sin-datos { text-align:center; padding:40px; color:#94a3b8; font-size:15px; }

        .overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,.6); backdrop-filter:blur(3px);
            z-index:1000; justify-content:center; align-items:center;
        }

        .overlay.activo { display:flex; }

        .modal {
            background:#fff; border-radius:20px;
            padding:36px 32px; width:100%; max-width:480px;
            box-shadow:0 24px 60px rgba(0,0,0,.35);
            animation:popIn .3s ease;
            border-top: 8px solid var(--morado-oscuro);
        }

        @keyframes popIn {
            from{ opacity:0; transform:scale(.9); }
            to  { opacity:1; transform:scale(1); }
        }

        .modal h2 { color: var(--azul-marino); font-size:22px; margin-bottom:22px; text-align:center; }

        .campo { margin-bottom:16px; }

        .campo label {
            display:block; font-size:12px; color:#64748b;
            margin-bottom:5px; text-transform:uppercase;
            letter-spacing:.5px; font-weight:600;
        }

        .campo input, .campo textarea {
            width:100%; padding:12px 14px;
            border:1px solid #c5cae9; border-radius:10px;
            font-size:14px; outline:none;
            background:#f8fafc; transition:all .3s;
            font-family:inherit;
        }

        .campo input:focus, .campo textarea:focus {
            border-color: var(--morado-oscuro);
            box-shadow: 0 0 0 4px rgba(74, 20, 140, 0.1);
            background: #fff;
        }

        .modal-acciones { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }

        .btn-guardar {
            background: var(--morado-oscuro);
            color:#fff; padding:11px 24px;
            border-radius:12px; border:none;
            font-size:14px; font-weight:bold; cursor:pointer; transition: .3s;
        }
        .btn-guardar:hover { background: var(--morado-claro); transform: translateY(-2px); }

        .btn-cancelar {
            background:#e2e8f0; color:#475569;
            padding:11px 24px; border-radius:12px;
            border:none; font-size:14px;
            font-weight:bold; cursor:pointer;
        }

        .btn-confirmar-eliminar {
            background: #d32f2f;
            color:#fff; padding:11px 24px;
            border-radius:12px; border:none;
            font-size:14px; font-weight:bold; cursor:pointer;
            text-decoration:none;
        }
    </style>
</head>
<body>
<div class="pagina">

    <div class="cabecera">
        <h1>📂 Categorías</h1>
        <div class="cabecera-acciones">
            <button class="btn btn-nuevo" onclick="abrirModalNuevo()">+ Nueva Categoría</button>
            <a th:href="@{/home}" class="btn btn-volver">← Volver al Inicio</a>
        </div>
    </div>

    <div th:if="${mensajeExito}" class="alerta-exito" th:text="${mensajeExito}"></div>

    <div class="buscador-wrap">
        <input class="buscador" type="text" id="buscador"
               placeholder="🔍 Buscar categoría..." onkeyup="filtrarTabla()">
    </div>

    <div class="tarjeta-tabla">
        <table id="tablaCategoria">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(categorias)}">
                <td colspan="4" class="sin-datos">No hay categorías registradas aún.</td>
            </tr>
            <tr th:each="cat : ${categorias}">
                <td th:text="${cat.idCategoria}"></td>
                <td th:text="${cat.nombreCategoria}"></td>
                <td th:text="${cat.descripcionCategoria != null ? cat.descripcionCategoria : '—'}"></td>
                <td>
                    <div class="acciones-td">
                        <a th:href="@{/categoria/editar/{id}(id=${cat.idCategoria})}"
                           class="btn-editar">✏ Editar</a>

                        <button class="btn-eliminar"
                                type="button"
                                th:data-id="${cat.idCategoria}"
                                th:data-nombre="${cat.nombreCategoria}"
                                onclick="prepararEliminar(this)">
                            🗑 Eliminar
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="overlay" id="modalOverlay" th:classappend="${mostrarModal} ? 'activo' : ''">
    <div class="modal">
        <h2 th:text="${modoEdicion} ? '✏ Editar Categoría' : '+ Nueva Categoría'"></h2>

        <form th:action="${modoEdicion} ? @{/categoria/actualizar/{id}(id=${categoriaForm.idCategoria})} : @{/categoria/guardar}"
              th:object="${categoriaForm}" method="post">

            <div class="campo">
                <label>Nombre</label>
                <input type="text" th:field="*{nombreCategoria}" placeholder="Nombre de la categoría" required>
            </div>
            <div class="campo">
                <label>Descripción</label>
                <textarea th:field="*{descripcionCategoria}" rows="3" placeholder="Descripción (opcional)"></textarea>
            </div>
            <div class="modal-acciones">
                <button type="button" class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn-guardar" th:text="${modoEdicion} ? '💾 Guardar Cambios' : '💾 Guardar'"></button>
            </div>
        </form>
    </div>
</div>

<div class="overlay" id="modalEliminar">
    <div class="modal">
        <h2 style="color:#d32f2f">⚠ Confirmar Eliminación</h2>
        <p id="textoConfirmar" style="text-align:center; margin-bottom:20px; color:#475569;"></p>
        <div class="modal-acciones" style="justify-content:center;">
            <button class="btn-cancelar" onclick="cerrarConfirmar()">Cancelar</button>
            <a id="linkEliminar" href="#" class="btn-confirmar-eliminar">Sí, Eliminar</a>
        </div>
    </div>
</div>

<script>
    function abrirModalNuevo() {
        document.getElementById('modalOverlay').classList.add('activo');
    }

    function cerrarModal() {
        document.getElementById('modalOverlay').classList.remove('activo');
        if(window.location.href.includes('editar')) window.location.href = '/categoria';
    }


    function prepararEliminar(boton) {
        const id = boton.getAttribute('data-id');
        const nombre = boton.getAttribute('data-nombre');
        const url = '/categoria/eliminar/' + id;

        document.getElementById('textoConfirmar').textContent =
            '¿Estás seguro de eliminar la categoría "' + nombre + '"?';
        document.getElementById('linkEliminar').href = url;
        document.getElementById('modalEliminar').classList.add('activo');
    }

    function cerrarConfirmar() {
        document.getElementById('modalEliminar').classList.remove('activo');
    }

    function filtrarTabla() {
        const filtro = document.getElementById('buscador').value.toLowerCase();
        const filas = document.querySelectorAll('#tablaCategoria tbody tr');
        filas.forEach(fila => {
            if(fila.querySelector('.sin-datos')) return;
            const texto = fila.textContent.toLowerCase();
            fila.style.display = texto.includes(filtro) ? '' : 'none';
        });
    }

    window.onclick = function(event) {
        if (event.target.classList.contains('overlay')) {
            cerrarModal();
            cerrarConfirmar();
        }
    }
</script>
</body>
</html>
