<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos — Tienda</title>
    <style>

        :root {
            --azul-marino: #1a237e;
            --morado-oscuro: #4a148c;
            --morado-claro: #7c43bd;
            --blanco: #ffffff;
            --gris-fondo: #f0f2f5;
        }

        *{margin:0;padding:0;box-sizing:border-box;}

        body {
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            min-height:100vh;
            background: linear-gradient(135deg, #0d1252, #1a237e, #283593);
            padding:30px 20px;
        }

        .pagina{max-width:960px;margin:0 auto;}

        .cabecera{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
        .cabecera h1{color:#fff;font-size:28px;text-shadow:0 2px 8px rgba(0,0,0,.3);}
        .cabecera-acciones{display:flex;gap:10px;}

        .btn{padding:10px 20px;border:none;border-radius:12px;font-size:14px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block;transition:all .3s;}

        .btn-nuevo {
            background: linear-gradient(135deg, var(--morado-oscuro), var(--morado-claro));
            color:#fff; box-shadow:0 6px 14px rgba(74,20,140,0.3);
        }
        .btn-nuevo:hover { transform:translateY(-2px); filter: brightness(1.1); }

        .btn-volver {
            background: #0d1252;
            color:#fff; box-shadow:0 6px 14px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-volver:hover { transform:translateY(-2px); background: #151b77; }

        .alerta-exito{background:#e8eaf6; color: var(--azul-marino); border:1px solid #c5cae9; border-radius:12px; padding:12px 18px; margin-bottom:18px; font-weight:500; font-size:14px;}

        .buscador-wrap{margin-bottom:16px;}
        .buscador{width:100%;padding:12px 16px;border:none;border-radius:12px;font-size:14px;outline:none;background:rgba(255,255,255,.92);box-shadow:0 4px 12px rgba(0,0,0,.1);}
        .buscador:focus{background:#fff; box-shadow: 0 0 0 3px rgba(74,20,140,0.2);}

        .tarjeta-tabla{background:rgba(255,255,255,.96);border-radius:20px;box-shadow:0 16px 40px rgba(0,0,0,.2);overflow:hidden;}
        table{width:100%;border-collapse:collapse;}

        thead tr{background: var(--azul-marino); color:#fff;}
        thead th{padding:16px 18px;text-align:left;font-size:13px;letter-spacing:.6px;text-transform:uppercase;}

        tbody tr{border-bottom:1px solid #f1f5f9;transition:background .2s;}
        tbody tr:last-child{border-bottom:none;}
        tbody tr:hover{background: #ede7f6;}
        tbody td{padding:14px 18px;color:#1e293b;font-size:14px;}

        .acciones-td{display:flex;gap:8px;}

        .btn-editar{
            background: var(--azul-marino);
            color:#fff; padding:7px 14px; border-radius:9px; font-size:12px;
            border:none; cursor:pointer; text-decoration:none;
            font-weight:bold; transition:all .3s;
        }
        .btn-editar:hover{background: #283593; transform:translateY(-1px);}

        .btn-eliminar{
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color:#fff; padding:7px 14px; border-radius:9px; font-size:12px;
            border:none; cursor:pointer; font-weight:bold; transition:all .3s;
        }
        .btn-eliminar:hover{transform:translateY(-1px);}

        .sin-datos{text-align:center;padding:40px;color:#94a3b8;font-size:15px;}

        .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:1000;justify-content:center;align-items:center;}
        .overlay.activo{display:flex;}

        .modal {
            background:#fff; border-radius:20px; padding:36px 32px; width:100%; max-width:480px;
            box-shadow:0 24px 60px rgba(0,0,0,.35); animation:popIn .3s ease;
            border-top: 8px solid var(--morado-oscuro);
        }
        @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

        .modal h2{color: var(--azul-marino); font-size:22px; margin-bottom:22px; text-align:center;}

        .campo{margin-bottom:16px;}
        .campo label{display:block;font-size:12px;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
        .campo input, .campo select{
            width:100%; padding:12px 14px; border:1px solid #c5cae9;
            border-radius:10px; font-size:14px; outline:none;
            background:#f8fafc; transition:all .3s;
        }
        .campo input:focus, .campo select:focus{border-color: var(--morado-oscuro); box-shadow:0 0 0 4px rgba(74,20,140,.1); background:#fff;}

        .error-campo{color:#b91c1c;font-size:12px;margin-top:4px;}

        .modal-acciones{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}

        .btn-guardar{
            background: var(--morado-oscuro); color:#fff;
            padding:11px 24px; border-radius:12px; border:none;
            font-size:14px; font-weight:bold; cursor:pointer; transition:all .3s;
        }
        .btn-guardar:hover{background: var(--morado-claro); transform:translateY(-2px);}

        .btn-cancelar{background:#e2e8f0;color:#475569;padding:11px 24px;border-radius:12px;border:none;font-size:14px;font-weight:bold;cursor:pointer;transition:all .3s;}
        .btn-confirmar-eliminar{background:#d32f2f; color:#fff; padding:11px 24px; border-radius:12px; border:none; text-decoration:none; font-weight:bold;}

        @media(max-width:600px){.cabecera{flex-direction:column;align-items:flex-start;}.modal{padding:26px 18px;margin:0 12px;}}
    </style>
</head>
<body>
<div class="pagina">
    <div class="cabecera">
        <h1>🛒 Pedidos</h1>
        <div class="cabecera-acciones">
            <button class="btn btn-nuevo" onclick="abrirModalNuevo()">+ Nuevo Pedido</button>
            <a th:href="@{/home}" class="btn btn-volver">← Volver al Inicio</a>
        </div>
    </div>

    <div th:if="${mensajeExito}" class="alerta-exito" th:text="${mensajeExito}"></div>

    <div class="buscador-wrap">
        <input class="buscador" type="text" id="buscador" placeholder="🔍 Buscar pedido..." onkeyup="filtrarTabla()">
    </div>

    <div class="tarjeta-tabla">
        <table id="tablaPedido">
            <thead>
            <tr><th>ID</th><th>Fecha</th><th>Total (Q)</th><th>Usuario</th><th>Acciones</th></tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(pedidos)}">
                <td colspan="5" class="sin-datos">No hay pedidos registrados aún.</td>
            </tr>
            <tr th:each="ped : ${pedidos}">
                <td th:text="${ped.idPedido}"></td>
                <td th:text="${ped.fechaPedido}"></td>
                <td th:text="'Q ' + ${ped.totalPedido}"></td>
                <td th:text="${ped.idUsuario}"></td>
                <td>
                    <div class="acciones-td">
                        <a th:href="@{/pedido/editar/{id}(id=${ped.idPedido})}" class="btn-editar">✏ Editar</a>
                        <button class="btn-eliminar"
                                th:onclick="|abrirConfirmarEliminar('/pedido/eliminar/${ped.idPedido}', 'Pedido #${ped.idPedido}')|">
                            🗑 Eliminar
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="overlay" id="modalOverlay" th:classappend="${mostrarModal} ? 'activo' : ''">
    <div class="modal">
        <h2 th:text="${modoEdicion} ? '✏ Editar Pedido' : '+ Nuevo Pedido'"></h2>

        <form th:action="${modoEdicion} ? @{/pedido/actualizar/{id}(id=${pedidoForm.idPedido})} : @{/pedido/guardar}"
              th:object="${pedidoForm}" method="post">

            <div class="campo">
                <label>Fecha</label>
                <input type="text" th:field="*{fechaPedido}" placeholder="ej. 2025-04-14">
                <span class="error-campo" th:if="${#fields.hasErrors('fechaPedido')}" th:errors="*{fechaPedido}"></span>
            </div>

            <div class="campo">
                <label>📦 Seleccionar Producto</label>
                <select id="productoSelect" name="idProducto">
                    <option value="" disabled selected>-- Seleccione un producto --</option>
                    <option th:each="p : ${productos}"
                            th:value="${p.idProducto}"
                            th:text="${p.nombreProducto} + ' - Q' + ${p.precioProducto}">
                    </option>
                </select>
            </div>

            <div class="campo">
                <label>Total (Q)</label>
                <input type="number" step="0.01" th:field="*{totalPedido}" placeholder="0.00">
                <span class="error-campo" th:if="${#fields.hasErrors('totalPedido')}" th:errors="*{totalPedido}"></span>
            </div>

            <div class="campo">
                <label>👤 Cliente / Usuario</label>
                <select th:field="*{idUsuario}" required>
                    <option value="" disabled selected>-- Seleccione un usuario --</option>
                    <option th:each="u : ${usuarios}"
                            th:value="${u.idUsuario}"
                            th:text="${u.nombreUsuario} + ' ' + ${u.apellidoUsuario}">
                    </option>
                </select>
                <span class="error-campo" th:if="${#fields.hasErrors('idUsuario')}" th:errors="*{idUsuario}"></span>
            </div>

            <div class="modal-acciones">
                <button type="button" class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn-guardar" th:text="${modoEdicion} ? '💾 Guardar Cambios' : '💾 Guardar'"></button>
            </div>
        </form>
    </div>
</div>

<div class="overlay" id="modalEliminar">
    <div class="modal">
        <h2 style="color: #dc2626;">⚠ Confirmar Eliminación</h2>
        <p id="textoConfirmar" style="text-align:center; color:#475569; margin: 15px 0;"></p>
        <div class="modal-acciones" style="justify-content:center;">
            <button class="btn-cancelar" onclick="cerrarConfirmar()">Cancelar</button>
            <a id="linkEliminar" href="#" class="btn-confirmar-eliminar">Sí, Eliminar</a>
        </div>
    </div>
</div>

<script>
    function abrirModalNuevo(){document.getElementById('modalOverlay').classList.add('activo');}
    function cerrarModal(){
        document.getElementById('modalOverlay').classList.remove('activo');
        if(window.location.href.includes('editar')) window.location.href = '/pedido';
    }
    function abrirConfirmarEliminar(url,nombre){
        document.getElementById('textoConfirmar').textContent='¿Estás seguro de eliminar el "'+nombre+'"?';
        document.getElementById('linkEliminar').href=url;
        document.getElementById('modalEliminar').classList.add('activo');
    }
    function cerrarConfirmar(){document.getElementById('modalEliminar').classList.remove('activo');}

    document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)cerrarModal();});
    document.getElementById('modalEliminar').addEventListener('click',function(e){if(e.target===this)cerrarConfirmar();});

    function filtrarTabla(){
        const f=document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('#tablaPedido tbody tr').forEach(r=>{
            if(r.querySelector('.sin-datos')) return;
            r.style.display=r.textContent.toLowerCase().includes(f)?'':'none';
        });
    }
</script>
</body>
</html>
